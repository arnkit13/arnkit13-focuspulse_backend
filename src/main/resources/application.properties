spring.application.name=focuspulse

# ── DataSource (Supabase PostgreSQL) ──────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP – keep small; Supabase pooler has connection limits
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────────────────────
# Base64-encoded secret (≥ 256 bits). Replace with your own before deploying.
app.jwt.secret=${JWT_SECRET}
# Token validity in milliseconds (default: 24 h)
app.jwt.expiration=86400000

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Debug logging for security and JWT filter behavior
logging.level.edu.cit.cabigas.focuspulse.config=DEBUG
logging.level.org.springframework.security=DEBUG


